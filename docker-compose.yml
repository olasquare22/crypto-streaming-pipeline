services:

  # ---------------------------
  # Kafka (official Apache image, KRaft mode - no Zookeeper needed)
  # ---------------------------
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    mem_limit: 700m
    ports:
      - "9092:9092"       # for clients running on your host machine
      - "9094:9094"       # for clients running inside other containers
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - crypto_net

  # ---------------------------
  # Cassandra (official image)
  # ---------------------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    mem_limit: 900m
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=crypto_cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      # This machine has only ~3.48GB total RAM, so we keep Cassandra's
      # heap intentionally small. This is fine for our tiny 5-row table.
      - MAX_HEAP_SIZE=500M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - crypto_net

  # ---------------------------
  # Grafana - for visualizing the Cassandra data.
  # Uses a community plugin since Grafana has no built-in Cassandra support.
  # ---------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    mem_limit: 400m
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=hadesarchitect-cassandra-datasource
      # Skip the login screen's first-time setup friction for a local dev box.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - cassandra
    networks:
      - crypto_net

volumes:
  kafka_data:
  cassandra_data:

networks:
  crypto_net:
    driver: bridge